<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DriverTraxxx</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --accent: #00a651;
    --accent-dark: #007a3d;
    --danger: #ff5449;
    --text: #ffffff;
    --muted: #888888;
    --border: #2a2a2a;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); max-width: 600px; margin: 0 auto; }

  header { background: #000000; color: #fff; padding: 14px 16px 0; border-bottom: 3px solid var(--accent); }
  header h1 { font-size: 22px; letter-spacing: 2px; color: var(--accent); }

  .tabs { display: flex; margin-top: 8px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; font-size: 13px;
    font-weight: bold; cursor: pointer; color: rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.3); letter-spacing: 0.5px;
  }
  .tab.active { color: #000; background: var(--accent); }

  .panel { display: none; padding: 20px 20px; }
  .panel.active { display: block; }

  .field-label { font-size: 11px; font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; margin-top: 10px; }

  input[type=text], select, textarea {
    width: 100%; padding: 11px 12px; font-size: 15px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--card); color: var(--text);
    text-transform: uppercase; margin-bottom: 4px;
  }
  textarea { text-transform: none; height: 70px; resize: vertical; }

  .notag-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 12px; margin-top: 10px;
    cursor: pointer;
  }
  .notag-row input[type=checkbox] {
    width: 11px; height: 11px; margin: 0; cursor: pointer;
    accent-color: var(--danger); flex-shrink: 0;
  }
  .notag-row label {
    font-size: 15px; font-weight: bold; text-transform: uppercase;
    letter-spacing: 0.5px; cursor: pointer; color: var(--text);
  }
  .notag-row.checked { border-color: var(--danger); background: #2a0f0f; }
  .notag-row.checked label { color: var(--danger); }
  .shuttle-row.shuttle-checked { border-color: #4d9bff; background: #0a1a2e; }
  .shuttle-row.shuttle-checked label { color: #4d9bff; }

  .btn {
    display: inline-block; padding: 11px 18px; font-size: 15px;
    border: none; border-radius: var(--radius); cursor: pointer;
    font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
    margin-top: 6px; width: 100%;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 900; }
  .btn-secondary { background: #1a1a1a; color: var(--accent); border: 1px solid var(--accent); margin-top: 4px; }
  .btn-danger { background: var(--danger); color: #fff; padding: 7px 12px; font-size: 13px; width: auto; margin-top: 0; }
  .btn-sm { padding: 6px 10px; font-size: 12px; width: auto; margin-top: 0; }

  .error-msg { color: var(--danger); font-size: 13px; margin-top: 4px; }

  /* TODAY'S ENTRIES SECTION */
  .today-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; margin-bottom: 8px; padding-top: 16px;
    border-top: 2px solid var(--border);
  }
  .today-title { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .today-count {
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: bold;
    padding: 2px 10px; border-radius: 12px;
  }
  .today-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }

  /* SHARED RECORD CARD */
  .record { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; }
  .record-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .record-serial { font-size: 17px; font-weight: bold; letter-spacing: 1px; }
  .record-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .record-status { font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-dest { background: #001a0d; color: #00a651; border: 1px solid #00a651; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-notag { background: #3d1a1a; color: #ff7066; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-shuttle { background: #0a1a2e; color: #4d9bff; border: 1px solid #4d9bff; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-CLEAN { background: #003d1f; color: #00a651; border: 1px solid #00a651; }
  .status-DIRTY { background: #3d1a1a; color: #ff7066; }
  .status-PM { background: #1a1a00; color: #e6e600; }
  .status-MK { background: #2a1a00; color: #f5a623; }
  .status-MR { background: #2a1a00; color: #f5a623; }
  .status-AUDIT { background: #1a001a; color: #cc66ff; }
  .status-OTHER { background: #1a1a1a; color: #888888; }
  .status-GLASS { background: #001a1a; color: #33cccc; }
  .status-WIDELETE { background: #3d1a1a; color: #ff7066; }
  .record-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .record-notes { font-size: 13px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); color: #bbb; }
  .record-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

  /* RECORDS TAB */
  .filter-bar { background: var(--card); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .filter-row input, .filter-row select { margin: 0; font-size: 13px; padding: 8px 10px; text-transform: none; flex: 1; }
  .filter-label { font-size: 11px; color: var(--muted); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
  .results-count { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  /* DASHBOARD */
  .dash-section { margin-bottom: 20px; }
  .dash-title { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-card.clickable { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .stat-card.clickable:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,166,81,0.2); }
  .stat-num { font-size: 28px; font-weight: bold; color: var(--accent); }
  .stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
  .bar-chart { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .bar-key { font-size: 12px; font-weight: bold; width: 80px; text-align: right; flex-shrink: 0; text-transform: uppercase; }
  .bar-track { flex: 1; background: #2a2a2a; border-radius: 4px; height: 18px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .bar-val { font-size: 12px; color: var(--muted); width: 24px; flex-shrink: 0; }
  .day-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .day-table th { background: #2a2a2a; padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .day-table td { padding: 8px 10px; border-top: 1px solid var(--border); }
  .day-table tr.has-entries { cursor: pointer; }
  .day-table tr.has-entries:hover td { background: #003d1f; }
  .day-table td.tap-hint { font-size: 11px; color: var(--accent); }
  .gps-status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 18px; text-align: center; }
  .gps-status.acquiring { color: var(--accent); }
  .gps-status.got { color: var(--accent); }
  .gps-status.err { color: var(--danger); }
  .record-gps { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .record-gps a { color: var(--accent); text-decoration: none; }
  .record-gps a:hover { text-decoration: underline; }

  /* LARGE SCAN BUTTON */
  .btn-scan-primary {
    width: 100%; padding: 26px; margin-top: 10px;
    background: var(--accent); color: #000; border: none;
    border-radius: var(--radius); font-size: 20px; font-weight: 900;
    letter-spacing: 1.5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .btn-scan-primary:active { background: var(--accent-dark); }

  .btn-manual-toggle {
    width: 50%; padding: 10px; margin-top: 8px;
    display: block; margin-left: auto; margin-right: auto;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13px; cursor: pointer; letter-spacing: 0.5px;
    text-align: center;
  }
  .btn-manual-toggle:active { color: var(--text); border-color: var(--text); }

  /* SCANNER OVERLAY */
  .scanner-overlay {
    position: fixed; inset: 0; background: #000;
    z-index: 1000; display: flex; flex-direction: column;
    max-width: 600px; margin: 0 auto;
  }
  .scanner-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; background: #000; border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
  }
  .scanner-title { font-size: 16px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
  .scanner-close {
    background: none; border: none; color: #fff; font-size: 24px;
    cursor: pointer; padding: 4px 10px; line-height: 1;
  }
  .scanner-viewport {
    position: relative; flex: 1; overflow: hidden; background: #000;
  }
  #scannerVideo {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  /* Dark overlay outside the scan zone */
  .scanner-mask {
    position: absolute; inset: 0; pointer-events: none;
  }
  .scanner-mask::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    clip-path: polygon(
      0% 0%, 100% 0%, 100% 100%, 0% 100%,
      0% 15%, 6% 15%, 6% 85%, 94% 85%, 94% 15%, 0% 15%
    );
  }
  /* Corners */
  .reticle-corner {
    position: absolute; width: 36px; height: 36px;
    border-color: var(--accent); border-style: solid;
    animation: cornerPulse 1.5s ease-in-out infinite;
  }
  .reticle-corner.tl { top: 15%; left: 6%; border-width: 4px 0 0 4px; }
  .reticle-corner.tr { top: 15%; right: 6%; border-width: 4px 4px 0 0; }
  .reticle-corner.bl { bottom: 15%; left: 6%; border-width: 0 0 4px 4px; }
  .reticle-corner.br { bottom: 15%; right: 6%; border-width: 0 4px 4px 0; }
  @keyframes cornerPulse {
    0%, 100% { opacity: 1; border-color: var(--accent); }
    50% { opacity: 0.5; border-color: #fff; }
  }
  /* Scan line */
  .reticle-line {
    position: absolute; left: 6%; right: 6%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanLine 2s ease-in-out infinite;
    border-radius: 2px;
  }
  @keyframes scanLine {
    0%   { top: 15%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 85%; opacity: 0; }
  }
  /* Scanner bottom bar */
  .scanner-bottom {
    background: #000; padding: 12px 16px 20px; flex-shrink: 0;
  }
  .scanner-status {
    text-align: center; font-size: 13px; color: var(--muted);
    letter-spacing: 0.5px; margin-bottom: 10px; min-height: 20px;
  }
  .scanner-status.scanning { color: var(--accent); }
  .scanner-status.success { color: var(--accent); font-weight: bold; font-size: 16px; }
  .scanner-status.error { color: var(--danger); }
  .scanner-dot {
    display: inline-block; animation: dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }
  .scanner-actions { display: flex; gap: 8px; }
  .btn-torch {
    background: #1a1a1a; color: #fff; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 16px; font-size: 18px;
    cursor: pointer; flex-shrink: 0;
  }
  .btn-torch.on { background: #fff; color: #000; border-color: #fff; }
  .btn-cancel {
    flex: 1; background: #1a1a1a; color: var(--accent);
    border: 1px solid var(--accent); border-radius: var(--radius);
    padding: 11px; font-size: 14px; font-weight: bold;
    cursor: pointer; letter-spacing: 0.5px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
    padding: 13px 24px; border-radius: 24px; font-size: 14px; font-weight: bold;
    white-space: nowrap; z-index: 9999; transition: bottom 0.3s ease;
    pointer-events: none; max-width: 90vw; text-align: center;
  }
  .toast-show { bottom: 28px; }
  .toast-success { background: var(--accent); color: #000; }
  .toast-warn { background: #b85c00; color: #fff; }
  .toast-error { background: var(--danger); color: #fff; }
  /* WEATHER ALERT */
  #weatherAlert {
    display: none; max-width: 600px; margin: 0 auto;
    background: #7a1a00; border-bottom: 2px solid #ff6b35;
    padding: 10px 16px;
  }
  .weather-alert-inner { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .weather-alert-text { display: flex; align-items: center; gap: 8px; flex: 1; }
  .weather-alert-icon { font-size: 18px; flex-shrink: 0; }
  .weather-alert-msg { font-size: 12px; font-weight: bold; color: #ffcdb2; letter-spacing: 0.3px; line-height: 1.3; }
  .weather-alert-close { background: none; border: none; color: #ffcdb2; font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }

  /* AVG BANNER */
  #avgBanner {
    background: var(--accent);
    color: #000;
    max-width: 600px;
    margin: 0 auto;
  }
  .avg-banner-stats {
    display: flex; align-items: stretch;
  }
  .avg-banner-stat {
    flex: 1; text-align: center; padding: 10px 16px;
  }
  .avg-banner-divider {
    width: 1px; background: rgba(0,0,0,0.2); margin: 8px 0;
  }
  .avg-banner-label {
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .avg-banner-time {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.2;
  }
</style>
</head>
<body>

<header>
  <h1><svg width="26" height="26" viewBox="0 0 100 100" fill="#00a651" style="vertical-align:middle;margin-right:8px;margin-bottom:3px" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46" stroke="#00a651" stroke-width="8" fill="none"/><circle cx="50" cy="50" r="10" fill="#00a651"/><line x1="50" y1="4" x2="50" y2="40" stroke="#00a651" stroke-width="8" stroke-linecap="round"/><line x1="50" y1="60" x2="50" y2="96" stroke="#00a651" stroke-width="8" stroke-linecap="round"/><line x1="4" y1="50" x2="40" y2="50" stroke="#00a651" stroke-width="8" stroke-linecap="round"/><line x1="60" y1="50" x2="96" y2="50" stroke="#00a651" stroke-width="8" stroke-linecap="round"/></svg>DRIVERTRAXXX</h1>
  <div class="tabs">
    <div class="tab active" onclick="showTab('entry')">NEW ENTRY</div>
    <div class="tab" onclick="showTab('records')">RECORDS</div>
    <div class="tab" onclick="showTab('dashboard')">DASHBOARD</div>
  </div>
</header>

<div id="weatherAlert">
  <div class="weather-alert-inner">
    <div class="weather-alert-text">
      <div class="weather-alert-icon">⚠️</div>
      <div class="weather-alert-msg" id="weatherAlertMsg"></div>
    </div>
    <button class="weather-alert-close" onclick="dismissWeatherAlert()">✕</button>
  </div>
</div>

<div id="avgBanner" style="display:none">
  <div class="avg-banner-stats">
    <div class="avg-banner-stat">
      <div class="avg-banner-label">AVG TRIP TIME</div>
      <div class="avg-banner-time" id="avgBannerTime">—</div>
    </div>
    <div class="avg-banner-divider"></div>
    <div class="avg-banner-stat">
      <div class="avg-banner-label">CARS / HOUR</div>
      <div class="avg-banner-time" id="avgBannerCph">—</div>
    </div>
  </div>
</div>

<!-- ==================== ENTRY PANEL ==================== -->
<div class="panel active" id="panel-entry">

  <button class="btn-scan-primary" onclick="openScanner()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/><rect x="3" y="17" width="4" height="4"/><line x1="7" y1="5" x2="17" y2="5"/><line x1="19" y1="7" x2="19" y2="17"/><line x1="7" y1="19" x2="17" y2="19"/><line x1="5" y1="7" x2="5" y2="17"/><line x1="10" y1="12" x2="14" y2="12"/><line x1="12" y1="10" x2="12" y2="14"/></svg>
    SCAN BARCODE
  </button>

  <button class="btn-manual-toggle" onclick="toggleManualEntry()">✏️ Enter Manually</button>

  <div id="manualEntrySection" style="display:none">
    <div class="field-label">Serial ID</div>
    <input type="text" id="serial" placeholder="Type Serial ID" autocomplete="off"
      oninput="this.value = this.value.toUpperCase()">
  </div>

  <div class="field-label">Status</div>
  <select id="status">
    <option value="">-- SELECT STATUS --</option>
    <option>CLEAN</option>
    <option>DIRTY</option>
    <option>PM</option>
    <option>MK</option>
    <option>MR</option>
    <option>AUDIT</option>
    <option>WI/DELETE</option>
    <option>GLASS</option>
    <option>OTHER</option>
  </select>

  <div class="field-label">Destination</div>
  <select id="destination">
    <option value="">-- SELECT DESTINATION --</option>
    <option>GARAGE</option>
    <option>QTA</option>
    <option>BACKLOT</option>
    <option>ATLANTIC</option>
    <option>BRANCH</option>
    <option>OTHER</option>
  </select>

  <div class="notag-row" id="noTagRow" onclick="document.getElementById('noTag').click()">
    <input type="checkbox" id="noTag" onclick="event.stopPropagation(); toggleNoTagStyle()">
    <label for="noTag">No Tag</label>
  </div>

  <div class="notag-row shuttle-row" id="shuttleRow" onclick="document.getElementById('shuttle').click()">
    <input type="checkbox" id="shuttle" onclick="event.stopPropagation(); toggleShuttleStyle()">
    <label for="shuttle">Shuttle</label>
  </div>

  <div class="field-label">Notes</div>
  <textarea id="notes" placeholder="Optional notes..."></textarea>

  <button id="saveBtn" class="btn btn-primary" onclick="saveRecord()">&#128190; SAVE RECORD</button>
  <div id="gpsStatus" class="gps-status"></div>

  <!-- TODAY'S ENTRIES -->
  <div class="today-header">
    <span class="today-title">Today's Entries</span>
    <span class="today-count" id="todayCount">0</span>
  </div>
  <div id="todayRecords"></div>
</div>

<!-- ==================== RECORDS PANEL ==================== -->
<div class="panel" id="panel-records">

  <div class="filter-bar">
    <div class="filter-label" id="recordsHeading">Filter Records</div>
    <div class="filter-row">
      <input type="text" id="fSearch" placeholder="Search serial..."
        oninput="this.value=this.value.toUpperCase(); renderRecords()">
      <select id="fStatus" onchange="renderRecords()">
        <option value="">All Statuses</option>
        <option>CLEAN</option><option>DIRTY</option>
        <option>PM</option><option>MK</option><option>MR</option>
        <option>AUDIT</option><option>WI/DELETE</option><option>GLASS</option><option>OTHER</option>
      </select>
    </div>
    <div class="filter-row">
      <select id="fNoTag" onchange="renderRecords()">
        <option value="">All Records</option>
        <option value="yes">No Tag Only</option>
        <option value="no">Has Tag Only</option>
      </select>
      <select id="fDest" onchange="renderRecords()">
        <option value="">All Destinations</option>
        <option>GARAGE</option><option>QTA</option><option>BACKLOT</option>
        <option>ATLANTIC</option><option>BRANCH</option><option>OTHER</option>
      </select>
    </div>
    <div class="filter-row">
      <input type="date" id="fDateFrom" onchange="renderRecords()">
      <input type="date" id="fDateTo" onchange="renderRecords()">
    </div>
    <button class="btn btn-secondary" style="margin-top:6px" onclick="clearFilters()">Clear Filters</button>
    <button class="btn btn-primary" style="margin-top:4px" onclick="exportCSV()">&#128229; EXPORT CSV</button>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div id="records"></div>
</div>

<!-- ==================== DASHBOARD PANEL ==================== -->
<div class="panel" id="panel-dashboard">

  <div class="dash-section">
    <div class="dash-title">&#128202; Overview</div>
    <div class="stat-grid" id="dashOverview"></div>
  </div>

  <div class="dash-section">
    <div class="dash-title">&#128203; By Status</div>
    <div class="bar-chart" id="dashStatus"></div>
  </div>

  <div class="dash-section">
    <div class="dash-title">&#128197; Last 7 Days <span style="font-size:11px;font-weight:normal">(tap a day to view entries)</span></div>
    <div id="dashDays"></div>
  </div>

  <div class="dash-section">
    <div class="dash-title">&#128467; This Week vs Last Week</div>
    <div class="stat-grid" id="dashWeeks"></div>
  </div>

</div>

<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

<!-- BARCODE SCANNER OVERLAY -->
<div id="scannerOverlay" class="scanner-overlay" style="display:none">
  <div class="scanner-header">
    <span class="scanner-title">&#128247; SCAN BARCODE</span>
    <button class="scanner-close" onclick="closeScanner()">&#10005;</button>
  </div>
  <div class="scanner-viewport">
    <video id="scannerVideo" autoplay playsinline muted></video>
    <div class="scanner-mask">
      <div class="reticle-corner tl"></div>
      <div class="reticle-corner tr"></div>
      <div class="reticle-corner bl"></div>
      <div class="reticle-corner br"></div>
      <div class="reticle-line"></div>
    </div>
  </div>
  <div class="scanner-bottom">
    <div class="scanner-status scanning" id="scannerHint">
      <span class="scanner-dot">●</span> Scanning...
    </div>
    <div class="scanner-actions">
      <button class="btn-torch" id="torchBtn" onclick="toggleTorch()" title="Flashlight">&#128294;</button>
      <button class="btn-cancel" onclick="closeScanner()">Cancel</button>
    </div>
  </div>
</div>
<script>

const DB_KEY = "drivertraxxx_records";
function getRecords() { return JSON.parse(localStorage.getItem(DB_KEY) || "[]"); }
function setRecords(r) { localStorage.setItem(DB_KEY, JSON.stringify(r)); }
function statusClass(s) { return "status-" + s.replace(/[^A-Z]/g,""); }
function todayStr() { return new Date().toISOString().slice(0,10); }

// ============================
// TABS
// ============================
function showTab(name) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  const idx = {entry:0, records:1, dashboard:2}[name];
  document.querySelectorAll(".tab")[idx].classList.add("active");
  if (name === "entry") renderTodayEntries();
  if (name === "records") renderRecords();
  if (name === "dashboard") renderDashboard();
}

// ============================
// MANUAL ENTRY TOGGLE
// ============================
function toggleManualEntry() {
  const section = document.getElementById("manualEntrySection");
  const btn = document.querySelector(".btn-manual-toggle");
  const visible = section.style.display !== "none";
  section.style.display = visible ? "none" : "block";
  btn.textContent = visible ? "✏️ Enter Manually" : "✕ Hide Manual Entry";
  if (!visible) document.getElementById("serial").focus();
}

function showManualEntry() {
  const section = document.getElementById("manualEntrySection");
  const btn = document.querySelector(".btn-manual-toggle");
  section.style.display = "block";
  btn.textContent = "✕ Hide Manual Entry";
}
function toggleNoTagStyle() {
  const checked = document.getElementById("noTag").checked;
  document.getElementById("noTagRow").classList.toggle("checked", checked);
}

const SHUTTLE_KEY = "drivertraxxx_shuttle";

function toggleShuttleStyle() {
  const checked = document.getElementById("shuttle").checked;
  document.getElementById("shuttleRow").classList.toggle("shuttle-checked", checked);
  localStorage.setItem(SHUTTLE_KEY, checked ? "1" : "0");
}

// ============================
// RECORD CARD HTML (shared)
// ============================
function recordCard(r, onDelete) {
  const gpsHtml = r.lat && r.lng
    ? `<div class="record-gps">&#128205; <a href="https://maps.google.com/?q=${r.lat},${r.lng}" target="_blank">${r.lat.toFixed(5)}, ${r.lng.toFixed(5)}</a></div>`
    : r.gpsError ? `<div class="record-gps" style="color:var(--muted)">&#128205; Location unavailable</div>` : "";
  return `
    <div class="record">
      <div class="record-header">
        <div class="record-serial">${r.serialId}</div>
        <div class="record-badges">
          <span class="record-status ${statusClass(r.status)}">${r.status}</span>
          ${r.destination ? `<span class="badge-dest">&#128205; ${r.destination}</span>` : ""}
          ${r.shuttle ? '<span class="badge-shuttle">🚌 SHUTTLE</span>' : ""}
          ${r.noTag ? '<span class="badge-notag">NO TAG</span>' : ""}
        </div>
      </div>
      <div class="record-meta">&#128336; ${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
      ${gpsHtml}
      ${r.notes ? `<div class="record-notes">${r.notes}</div>` : ""}
      <div class="record-footer">
        <button class="btn btn-danger btn-sm" onclick="${onDelete}('${r.id}')">Delete</button>
      </div>
    </div>`;
}

// ============================
// WEATHER ALERT (SDF / Louisville 40213)
// ============================
const EXTREME_CODES = {
  65:"Heavy Rain", 75:"Heavy Snow", 77:"Snow Grains",
  82:"Violent Showers", 85:"Snow Showers", 86:"Heavy Snow Showers",
  95:"Thunderstorm", 96:"Thunderstorm + Hail", 99:"Thunderstorm + Heavy Hail"
};

const ALERT_DISMISSED_KEY = "drivertraxxx_alert_dismissed";

function dismissWeatherAlert() {
  const alert = document.getElementById("weatherAlert");
  alert.style.display = "none";
  // Remember dismissed for 30 min so it doesn't keep reappearing
  localStorage.setItem(ALERT_DISMISSED_KEY, Date.now().toString());
}

async function checkWeatherAlert() {
  // Don't show if dismissed in last 30 min
  const dismissed = parseInt(localStorage.getItem(ALERT_DISMISSED_KEY) || "0");
  if (Date.now() - dismissed < 30 * 60 * 1000) return;

  try {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=38.1741&longitude=-85.7368&current=temperature_2m,weathercode,windspeed_10m&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FChicago";
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    const code = c.weathercode;
    const temp = Math.round(c.temperature_2m);
    const wind = Math.round(c.windspeed_10m);

    const alerts = [];
    if (EXTREME_CODES[code]) alerts.push(EXTREME_CODES[code]);
    if (temp <= 20) alerts.push(`Extreme Cold: ${temp}°F`);
    if (temp >= 100) alerts.push(`Extreme Heat: ${temp}°F`);
    if (wind >= 40) alerts.push(`High Winds: ${wind}mph`);

    const alertEl = document.getElementById("weatherAlert");
    if (alerts.length > 0) {
      document.getElementById("weatherAlertMsg").textContent =
        "⚠️ SDF WEATHER ALERT: " + alerts.join(" · ");
      alertEl.style.display = "block";
    } else {
      alertEl.style.display = "none";
    }
  } catch(e) {
    // Silently fail — no alert shown if fetch fails
  }
}

// ============================
// AVG BANNER
// ============================
function updateAvgBanner() {
  const today = todayStr();
  const timestamps = getRecords()
    .filter(r => new Date(r.timestamp).toISOString().slice(0,10) === today)
    .map(r => r.timestamp)
    .sort((a,b) => a - b);

  const banner = document.getElementById("avgBanner");

  if (timestamps.length < 2) {
    banner.style.display = "none";
    return;
  }

  // Avg trip time
  const gaps = [];
  for (let i = 1; i < timestamps.length; i++) {
    gaps.push(timestamps[i] - timestamps[i-1]);
  }
  const avgMs = gaps.reduce((a,b) => a+b, 0) / gaps.length;
  const mins = Math.round(avgMs / 60000);
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const timeStr = h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : `${m}m`;

  // Avg cars per hour — total entries over elapsed time since first entry
  const elapsedMs = timestamps[timestamps.length - 1] - timestamps[0];
  const elapsedHrs = elapsedMs / 3600000;
  const cph = elapsedHrs > 0 ? (timestamps.length / elapsedHrs).toFixed(1) : "—";

  document.getElementById("avgBannerTime").textContent = timeStr;
  document.getElementById("avgBannerCph").textContent = cph;
  banner.style.display = "block";
}

// ============================
// TOAST NOTIFICATION
// ============================
function showToast(msg, type = "success") {
  let toast = document.getElementById("toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "toast";
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.className = "toast toast-" + type + " toast-show";
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.className = "toast"; }, 2800);
}

// ============================
// SAVE RECORD
// ============================
function saveRecord() {
  const serial = document.getElementById("serial").value.trim().toUpperCase();
  if (!serial) { showToast("Please enter or scan a Serial ID.", "error"); return; }
  const statusVal = document.getElementById("status").value;
  if (!statusVal) { showToast("Please select a status.", "error"); return; }

  const saveBtn = document.getElementById("saveBtn");
  const gpsEl = document.getElementById("gpsStatus");

  // Lock button while acquiring
  saveBtn.disabled = true;
  saveBtn.innerHTML = "📡 Getting location...";
  gpsEl.className = "gps-status acquiring";
  gpsEl.textContent = "Acquiring GPS coordinates...";

  const recordData = {
    id: Date.now().toString(),
    serialId: serial,
    status: statusVal,
    destination: document.getElementById("destination").value,
    noTag: document.getElementById("noTag").checked,
    shuttle: document.getElementById("shuttle").checked,
    notes: document.getElementById("notes").value,
    timestamp: Date.now()
  };

  function doSave(lat, lng, gpsError) {
    if (lat !== null) { recordData.lat = lat; recordData.lng = lng; }
    if (gpsError) { recordData.gpsError = true; }

    const records = getRecords();
    records.unshift(recordData);
    setRecords(records);

    // Reset form
    document.getElementById("serial").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("status").selectedIndex = 0;
    document.getElementById("destination").selectedIndex = 0;
    document.getElementById("noTag").checked = false;
    toggleNoTagStyle();
    document.getElementById("manualEntrySection").style.display = "none";
    document.querySelector(".btn-manual-toggle").textContent = "✏️ Enter Manually";

    // Restore button
    saveBtn.disabled = false;
    saveBtn.innerHTML = "&#128190; SAVE RECORD";
    gpsEl.className = "gps-status";
    gpsEl.textContent = "";

    renderTodayEntries();

    if (gpsError) {
      showToast("✅ Saved — no GPS location", "warn");
    } else {
      showToast("✅ Record saved with GPS", "success");
    }
  }

  if ("geolocation" in navigator) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsEl.className = "gps-status got";
        gpsEl.textContent = "✓ Location acquired";
        doSave(pos.coords.latitude, pos.coords.longitude, false);
      },
      err => {
        gpsEl.className = "gps-status err";
        gpsEl.textContent = "⚠️ Location unavailable — saving anyway";
        saveBtn.innerHTML = "&#128190; Saving...";
        setTimeout(() => doSave(null, null, true), 800);
      },
      { timeout: 8000, maximumAge: 30000, enableHighAccuracy: true }
    );
  } else {
    doSave(null, null, true);
  }
}

// ============================
// TODAY'S ENTRIES (entry tab)
// ============================
function renderTodayEntries() {
  const today = todayStr();
  const records = getRecords().filter(r => new Date(r.timestamp).toISOString().slice(0,10) === today);
  document.getElementById("todayCount").textContent = records.length;
  updateAvgBanner();
  if (records.length === 0) {
    document.getElementById("todayRecords").innerHTML = '<div class="today-empty">No entries yet today.</div>';
    return;
  }
  document.getElementById("todayRecords").innerHTML = records.map(r => recordCard(r, "deleteTodayRecord")).join("");
}

function deleteTodayRecord(id) {
  if (!confirm("Delete this record? This cannot be undone.")) return;
  setRecords(getRecords().filter(r => r.id !== id));
  renderTodayEntries();
}

// ============================
// DELETE (records tab)
// ============================
function deleteRecord(id) {
  if (!confirm("Delete this record? This cannot be undone.")) return;
  setRecords(getRecords().filter(r => r.id !== id));
  renderRecords();
}

// ============================
// FILTER
// ============================
function getFiltered() {
  const search = document.getElementById("fSearch").value.trim().toUpperCase();
  const status = document.getElementById("fStatus").value;
  const noTagFilter = document.getElementById("fNoTag").value;
  const dest = document.getElementById("fDest").value;
  const from = document.getElementById("fDateFrom").value;
  const to = document.getElementById("fDateTo").value;

  return getRecords().filter(r => {
    if (search && !r.serialId.includes(search)) return false;
    if (status && r.status !== status) return false;
    if (noTagFilter === "yes" && !r.noTag) return false;
    if (noTagFilter === "no" && r.noTag) return false;
    if (dest && r.destination !== dest) return false;
    const ds = new Date(r.timestamp).toISOString().slice(0,10);
    if (from && ds < from) return false;
    if (to && ds > to) return false;
    return true;
  });
}

function clearFilters() {
  ["fSearch","fDateFrom","fDateTo"].forEach(id => document.getElementById(id).value = "");
  ["fStatus","fNoTag","fDest"].forEach(id => document.getElementById(id).selectedIndex = 0);
  document.getElementById("recordsHeading").textContent = "Filter Records";
  renderRecords();
}

// ============================
// DRILL INTO DATE / WEEK
// ============================
function viewByDate(dateStr) {
  document.getElementById("fDateFrom").value = dateStr;
  document.getElementById("fDateTo").value = dateStr;
  document.getElementById("fSearch").value = "";
  document.getElementById("fStatus").selectedIndex = 0;
  document.getElementById("fNoTag").selectedIndex = 0;
  document.getElementById("fDest").selectedIndex = 0;
  document.getElementById("recordsHeading").textContent = "Entries for " + dateStr;
  showTab("records");
}

function viewByWeek(fromStr, toStr, label) {
  document.getElementById("fDateFrom").value = fromStr;
  document.getElementById("fDateTo").value = toStr;
  document.getElementById("fSearch").value = "";
  document.getElementById("fStatus").selectedIndex = 0;
  document.getElementById("fNoTag").selectedIndex = 0;
  document.getElementById("fDest").selectedIndex = 0;
  document.getElementById("recordsHeading").textContent = label;
  showTab("records");
}

// ============================
// RENDER RECORDS TAB
// ============================
function renderRecords() {
  const records = getFiltered();
  document.getElementById("resultsCount").textContent =
    records.length + " record" + (records.length !== 1 ? "s" : "") + " found";

  if (records.length === 0) {
    document.getElementById("records").innerHTML =
      '<p style="color:var(--muted);text-align:center;padding:24px">No records match your filters.</p>';
    return;
  }
  document.getElementById("records").innerHTML = records.map(r => recordCard(r, "deleteRecord")).join("");
}

// ============================
// EXPORT CSV
// ============================
function exportCSV() {
  const records = getFiltered();
  if (records.length === 0) { showToast("No records to export.", "error"); return; }
  const rows = [["ID","Serial ID","Status","Destination","Shuttle","No Tag","Notes","Latitude","Longitude","Timestamp"]];
  records.forEach(r => rows.push([
    r.id, r.serialId, r.status,
    r.destination || "",
    r.shuttle ? "YES" : "NO",
    r.noTag ? "YES" : "NO",
    (r.notes || "").replace(/,/g,";"),
    r.lat !== undefined ? r.lat.toFixed(6) : "",
    r.lng !== undefined ? r.lng.toFixed(6) : "",
    new Date(r.timestamp).toLocaleString()
  ]));
  const csv = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `drivertraxxx_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ============================
// DASHBOARD
// ============================
function startOfWeek(d) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() - dt.getDay());
  dt.setHours(0,0,0,0);
  return dt;
}

function isoDate(d) { return d.toISOString().slice(0,10); }

function renderDashboard() {
  const all = getRecords();
  const now = new Date();
  const today = isoDate(now);
  const thisWeekStart = startOfWeek(now);
  const lastWeekStart = new Date(thisWeekStart); lastWeekStart.setDate(lastWeekStart.getDate() - 7);
  const lastWeekEnd = new Date(thisWeekStart);

  let todayCount=0, thisWeekCount=0, lastWeekCount=0, noTagCount=0;
  all.forEach(r => {
    const d = new Date(r.timestamp);
    if (isoDate(d) === today) todayCount++;
    if (d >= thisWeekStart) thisWeekCount++;
    if (d >= lastWeekStart && d < lastWeekEnd) lastWeekCount++;
    if (r.noTag) noTagCount++;
  });

  const thisWeekEnd = isoDate(now);
  const thisWeekFromStr = isoDate(thisWeekStart);
  const lastWeekFromStr = isoDate(lastWeekStart);
  const lastWeekToStr = isoDate(new Date(lastWeekEnd.getTime() - 86400000));

  document.getElementById("dashOverview").innerHTML = `
    <div class="stat-card clickable" onclick="viewByDate('${today}')">
      <div class="stat-num">${todayCount}</div><div class="stat-label">Today &#8594;</div>
    </div>
    <div class="stat-card clickable" onclick="viewByWeek('${thisWeekFromStr}','${thisWeekEnd}','This Week')">
      <div class="stat-num">${thisWeekCount}</div><div class="stat-label">This Week &#8594;</div>
    </div>
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${noTagCount}</div><div class="stat-label">No Tag</div></div>
  `;

  const statuses = ["CLEAN","DIRTY","PM","MK","MR","AUDIT","WI/DELETE","GLASS","OTHER"];
  const sc = {};
  statuses.forEach(s => sc[s] = 0);
  all.forEach(r => { sc[r.status] !== undefined ? sc[r.status]++ : sc["OTHER"]++; });
  const maxS = Math.max(...Object.values(sc), 1);
  document.getElementById("dashStatus").innerHTML = statuses
    .filter(s => sc[s] > 0)
    .map(s => `
      <div class="bar-row">
        <div class="bar-key">${s}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(sc[s]/maxS*100)}%"></div></div>
        <div class="bar-val">${sc[s]}</div>
      </div>
    `).join("") || '<p style="color:var(--muted);padding:8px">No data yet.</p>';

  // Last 7 days — clickable rows with avg trip time
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(now); d.setDate(d.getDate()-i);
    days.push(isoDate(d));
  }

  // Group records by day, sorted oldest->newest per day
  const byDay = {};
  days.forEach(d => byDay[d] = []);
  all.forEach(r => {
    const ds = isoDate(new Date(r.timestamp));
    if (byDay[ds] !== undefined) byDay[ds].push(r.timestamp);
  });
  days.forEach(d => byDay[d].sort((a,b) => a - b));

  function avgTripTime(timestamps) {
    if (timestamps.length < 2) return null;
    const gaps = [];
    for (let i = 1; i < timestamps.length; i++) {
      gaps.push(timestamps[i] - timestamps[i-1]);
    }
    const avgMs = gaps.reduce((a,b) => a+b, 0) / gaps.length;
    const mins = Math.round(avgMs / 60000);
    if (mins < 60) return mins + "m";
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

  const dn = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  document.getElementById("dashDays").innerHTML = `
    <table class="day-table" style="width:100%">
      <thead><tr><th>Date</th><th>Day</th><th>Trips</th><th>Avg Time</th><th></th></tr></thead>
      <tbody>
        ${days.map(d => {
          const dt = new Date(d+"T12:00:00");
          const cnt = byDay[d].length;
          const isToday = d === today;
          const avg = avgTripTime(byDay[d]);
          const dateCell = `${d}${isToday ? ' <b style="color:var(--accent)">(today)</b>' : ''}`;
          if (cnt > 0) {
            return `<tr class="has-entries" onclick="viewByDate('${d}')">
              <td>${dateCell}</td>
              <td>${dn[dt.getDay()]}</td>
              <td><b>${cnt}</b></td>
              <td style="color:var(--accent);font-weight:bold">${avg || '<span style="color:var(--muted)">—</span>'}</td>
              <td class="tap-hint">View &#8594;</td>
            </tr>`;
          } else {
            return `<tr>
              <td>${dateCell}</td>
              <td>${dn[dt.getDay()]}</td>
              <td style="color:var(--muted)">0</td>
              <td style="color:var(--muted)">—</td>
              <td></td>
            </tr>`;
          }
        }).join("")}
      </tbody>
    </table>`;

  // Week comparison — clickable
  const delta = thisWeekCount - lastWeekCount;
  const dStr = delta>0 ? "&#9650; +"+delta+" vs last week" : delta<0 ? "&#9660; "+delta+" vs last week" : "Same as last week";
  const dColor = delta>0 ? "var(--accent)" : delta<0 ? "var(--danger)" : "var(--muted)";
  document.getElementById("dashWeeks").innerHTML = `
    <div class="stat-card clickable" onclick="viewByWeek('${thisWeekFromStr}','${thisWeekEnd}','This Week')">
      <div class="stat-num">${thisWeekCount}</div><div class="stat-label">This Week &#8594;</div>
    </div>
    <div class="stat-card clickable" onclick="viewByWeek('${lastWeekFromStr}','${lastWeekToStr}','Last Week')">
      <div class="stat-num">${lastWeekCount}</div><div class="stat-label">Last Week &#8594;</div>
    </div>
    <div class="stat-card" style="grid-column:span 2">
      <div class="stat-num" style="font-size:18px;color:${dColor}">${dStr}</div>
      <div class="stat-label">Week-over-Week</div>
    </div>`;
}

// ============================
// BARCODE SCANNER (ZXing)
// ============================
let codeReader = null;
let scannerActive = false;
let torchOn = false;
let activeStream = null;

function openScanner() {
  const overlay = document.getElementById("scannerOverlay");
  const hint = document.getElementById("scannerHint");
  overlay.style.display = "flex";
  hint.className = "scanner-status scanning";
  hint.innerHTML = '<span class="scanner-dot">●</span> Starting camera...';
  torchOn = false;
  document.getElementById("torchBtn").classList.remove("on");

  if (!window.ZXing) {
    hint.className = "scanner-status error";
    hint.textContent = "Scanner not loaded. Use manual entry.";
    return;
  }

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    scannerActive = true;

    codeReader.listVideoInputDevices().then(devices => {
      const rearCam = devices.find(d =>
        /back|rear|environment/i.test(d.label)
      ) || devices[devices.length - 1];

      const deviceId = rearCam ? rearCam.deviceId : undefined;

      // Get stream for torch control
      const constraints = {
        video: {
          deviceId: deviceId ? { exact: deviceId } : undefined,
          facingMode: deviceId ? undefined : "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      };

      navigator.mediaDevices.getUserMedia(constraints).then(stream => {
        activeStream = stream;
        document.getElementById("scannerVideo").srcObject = stream;
        hint.innerHTML = '<span class="scanner-dot">●</span> Scanning...';
      }).catch(() => {});

      codeReader.decodeFromVideoDevice(deviceId, "scannerVideo", (result, err) => {
        if (!scannerActive) return;
        if (result) {
          const code = result.getText().trim().toUpperCase();

          // Flash green, vibrate
          hint.className = "scanner-status success";
          hint.textContent = "✓ " + code;
          navigator.vibrate && navigator.vibrate([80, 40, 80]);

          document.getElementById("serial").value = code;
          showManualEntry();

          setTimeout(() => closeScanner(), 600);
        }
      });

      hint.innerHTML = '<span class="scanner-dot">●</span> Scanning...';

    }).catch(() => {
      hint.className = "scanner-status error";
      hint.textContent = "Camera access denied. Check permissions.";
    });

  } catch(e) {
    hint.className = "scanner-status error";
    hint.textContent = "Scanner unavailable. Use manual entry.";
  }
}

function closeScanner() {
  scannerActive = false;
  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }
  if (activeStream) {
    activeStream.getTracks().forEach(t => t.stop());
    activeStream = null;
  }
  torchOn = false;
  document.getElementById("scannerOverlay").style.display = "none";
}

function toggleTorch() {
  if (!activeStream) return;
  const track = activeStream.getVideoTracks()[0];
  if (!track || !track.getCapabilities) return;
  const caps = track.getCapabilities();
  if (!caps.torch) {
    showToast("Torch not available on this device", "warn");
    return;
  }
  torchOn = !torchOn;
  track.applyConstraints({ advanced: [{ torch: torchOn }] });
  document.getElementById("torchBtn").classList.toggle("on", torchOn);
}

// ============================
// INIT
// ============================
if (localStorage.getItem(SHUTTLE_KEY) === "1") {
  document.getElementById("shuttle").checked = true;
  document.getElementById("shuttleRow").classList.add("shuttle-checked");
}
checkWeatherAlert();
setInterval(checkWeatherAlert, 15 * 60 * 1000); // recheck every 15 minrenderTodayEntries();

</script>
