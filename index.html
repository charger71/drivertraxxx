<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DriverTraxxx</title>

  <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #f7f7f7;
    }

    input, select, textarea, button {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      font-size: 16px;
    }

    .record {
      background: white;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
    }

    .image-preview {
      width: 100%;
      max-width: 300px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      display: none;
    }

    .error-message {
      color: red;
      font-size: 14px;
    }

    .cropper-container {
      max-width: 100%;
      margin-top: 20px;
    }

    .cropper-container img {
      max-width: 100%;
    }

    .crop-button {
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>DriverTraxxx</h2>

  <h3>New Entry</h3>

  <input type="text" id="serial" placeholder="Scan Serial ID" aria-label="Scan Serial ID" autocomplete="off">

  <!-- Camera file input for image capture -->
  <input type="file" id="scan" accept="image/*" capture="camera">

  <!-- Image preview -->
  <img id="imagePreview" class="image-preview" alt="Captured Image Preview">

  <!-- Cropper.js container -->
  <div id="cropperContainer" class="cropper-container" style="display: none;">
    <img id="imageToCrop" src="" alt="Image to crop" />
  </div>

  <!-- Crop button -->
  <button id="cropButton" class="crop-button" style="display: none;">Crop & Process OCR</button>

  <select id="status">
    <option>CLEAN</option>
    <option>DIRTY</option>
    <option>PM</option>
    <option>MR</option>
    <option>AUDIT FAIL</option>
    <option>WI</option>
    <option>GLASS</option>
    <option>OTHER</option>
  </select>

  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="saveRecord()">Save</button>
  <button onclick="exportData()">Export JSON</button>

  <h3>Records</h3>
  <div id="records"></div>

  <!-- Include Tesseract.js for OCR processing -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>

  <script>
    // ==========================
    // Local Storage DB Functions
    // ==========================
    const DB_KEY = "drivertraxxx_records";

    function getRecords() {
      return JSON.parse(localStorage.getItem(DB_KEY) || "[]");
    }

    function setRecords(records) {
      localStorage.setItem(DB_KEY, JSON.stringify(records));
    }

    // ==========================
    // Save Record
    // ==========================
    function saveRecord() {
      const records = getRecords();
      const record = {
        id: Date.now().toString(),
        serialId: document.getElementById("serial").value,
        status: document.getElementById("status").value,
        notes: document.getElementById("notes").value,
        timestamp: Date.now(),
        lastEditedAt: Date.now()
      };
      records.unshift(record);
      setRecords(records);
      render();
    }

    // ==========================
    // Delete Record
    // ==========================
    function deleteRecord(id) {
      let records = getRecords();
      records = records.filter(r => r.id !== id);
      setRecords(records);
      render();
    }

    // ==========================
    // Render Records
    // ==========================
    function render() {
      const records = getRecords();
      document.getElementById("records").innerHTML = records
        .map(r => `
          <div class="record">
            <b>${r.serialId}</b><br>
            ${r.status}<br>
            ${new Date(r.timestamp).toLocaleString()}<br>
            <button onclick="deleteRecord('${r.id}')">Delete</button>
          </div>
        `)
        .join("");
    }

    // ==========================
    // Export Data
    // ==========================
    function exportData() {
      const records = getRecords();
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "drivertraxxx.json";
      a.click();
    }

    // ==========================
    // OCR Scan (QR/Text) via Tesseract.js
    // ==========================
    document.getElementById("scan").addEventListener("change", async (e) => {
      const file = e.target.files[0];

      if (file && file.type.startsWith("image")) {
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            document.getElementById("imagePreview").style.display = "block";
            document.getElementById("imagePreview").src = event.target.result;

            // Initialize Cropper.js
            const cropper = new Cropper(document.getElementById("imageToCrop"), {
              aspectRatio: NaN, // allows free cropping
              viewMode: 1, // contains the image within the view box
              responsive: true
            });

            // Show cropper and crop button
            document.getElementById("cropperContainer").style.display = "block";
            document.getElementById("cropButton").style.display = "block";

            // Handle crop action
            document.getElementById("cropButton").addEventListener("click", () => {
              const croppedCanvas = cropper.getCroppedCanvas();
              croppedCanvas.toBlob((blob) => {
                // Now that we have the cropped image, perform OCR
                processOCR(blob);
              });
            });
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // ==========================
    // Process OCR
    // ==========================
    function processOCR(imageBlob) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          Tesseract.recognize(img, "eng")
            .then(result => {
              const text = result.data.text.replace(/[^A-Z0-9]/gi, "").trim();
              if (text) {
                document.getElementById("serial").value = text;
              } else {
                displayError("OCR could not read any text from the cropped image.");
              }
            })
            .catch(error => {
              console.error("OCR failed:", error);
              displayError("OCR processing failed.");
            });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(imageBlob);
    }

    // Display error message if OCR fails
    function displayError(message) {
      const errorMessage = document.createElement("div");
      errorMessage.classList.add("error-message");
      errorMessage.textContent = message;
      document.body.appendChild(errorMessage);

      setTimeout(() => {
        errorMessage.remove();
      }, 5000);
    }

    // ==========================
    // Init
    // ==========================
    render();
  </script>

</body>
</html>
